{% extends 'base.html' %}
{% block content %}
<div class="container">
  <h2>Novo Documento</h2>
  {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  <form method="post" enctype="multipart/form-data">
    <div class="form-group">
      <label>Nome</label>
      <input class="form-control" name="nome" value="{{ nome or '' }}" />
    </div>
    <div class="form-group">
      <label>Cliente</label>
      <select name="cliente_id" class="form-control">
        <option value="">-- selecione --</option>
        {% for c in clients %}
          <option value="{{ c.id }}" {% if c.id|string == cliente_id|string %}selected{% endif %}>{{ c.nome }} ({{ c.email }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Ficheiro</label>
      <input type="file" name="ficheiro" class="form-control" />
    </div>
    <div class="form-group">
      <button class="btn btn-primary" type="submit">Guardar</button>
      <a class="btn" href="{{ url_for('admin_documentos') }}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
